{% extends 'game/base.html' %}

{% block content %}
<div class="login-form">
    <h2>Вход в игру</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-yes" style="width: 100%;">Войти</button>
    </form>
    <p style="text-align: center; margin-top: 20px;">
        Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
    </p>
</div>

<style>
    input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 16px;
        margin-bottom: 15px;
    }
    label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
    }
</style>
{% endblock %}
