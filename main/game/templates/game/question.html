<!-- game/templates/game/question.html -->
{% extends 'game/base.html' %}
{% load static %}

{% block content %}
<div class="question-box">
    
    {% if question.image %}
        <div class="question-image">
            <img src="{% static question.image %}" alt="Иллюстрация к вопросу">
        </div>
    {% endif %}
    
    <h2 class="question-text">{{ question.text }}</h2>
    
    <form method="post" class="answers-form">
        {% csrf_token %}
        
        <!-- Вертикальные кнопки -->
        <div class="answers-vertical">
            {% for answer in answers %}
                <button type="submit" 
                        name="answer_id" 
                        value="{{ answer.id }}"
                        class="answer-btn">
                    
                    <!-- Текст -->
                    <span class="answer-text">{{ answer.text }}</span>
                    
                    <!-- Картинка под текстом (вертикальная) -->
                    {% if answer.image %}
                        <div class="answer-image">
                            <img src="{% static answer.image %}" alt="{{ answer.text }}">
                        </div>
                    {% endif %}
                    
                </button>
            {% endfor %}
        </div>
    </form>
    
    <form action="{% url 'reset_game' %}" method="post" class="reset-form">
        {% csrf_token %}
        <button type="submit" class="reset-btn">🔄 Начать заново</button>
    </form>
</div>

<style>
    .question-box {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }
    
    .question-image {
        text-align: center;
        margin-bottom: 30px;
    }
    
    .question-image img {
        max-width: 100%;
        max-height: 250px;
        border-radius: 15px;
    }
    
    .question-text {
        text-align: center;
        margin-bottom: 40px;
        color: #333;
        font-size: 28px;
        font-weight: bold;
    }
    
    /* Контейнер для кнопок - по центру */
    .answers-vertical {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        width: 100%;
    }
    
    /* КНОПКИ - УЗКИЕ И ВЫСОКИЕ */
    .answer-btn {
        width: 250px;  /* Узкие кнопки */
        min-height: 300px;  /* Высокие кнопки */
        padding: 20px 15px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        border-radius: 15px;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        gap: 15px;
    }
    
    .answer-btn:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    
    /* Текст ответа */
    .answer-text {
        color: white;
        font-size: 24px;
        font-weight: bold;
        text-align: center;
        word-break: break-word;
    }

    .answer-image {
        width: 100%;
        max-width: 180px;
        margin: 0 auto;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .answer-image img {
        width: auto;
        height: 200px;
        max-width: 140px;
        object-fit: cover;
        border-radius: 10px;
        box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    }
    
    .reset-form {
        margin-top: 40px;
        text-align: center;
    }
    
    .reset-btn {
        padding: 12px 30px;
        font-size: 16px;
        background: #48bb78;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
    }
    
    .reset-btn:hover {
        background: #38a169;
    }
    
    /* Если кнопок много - они будут в ряд на больших экранах */
    @media (min-width: 768px) {
        .answers-vertical {
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
        }
    }

</style>
{% endblock %}
